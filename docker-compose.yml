services:
  app:
    build: .
    container_name: locus-app
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=locus
      - DB_USER=locus
      - DB_PASS=locus_pass
      - JWT_SECRET=super-secret-key-change-in-production-123
      - APP_URL=http://localhost:8080
    volumes:
      - locus_data:/var/www/html/storage
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: locus-db
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=locus
      - MYSQL_USER=locus
      - MYSQL_PASSWORD=locus_pass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  db_data:
  locus_data:
